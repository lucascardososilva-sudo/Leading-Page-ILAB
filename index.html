<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SanFran InovaLab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            fox: {
              50: '#fff5eb',
              100: '#ffe8cc',
              400: '#fdaf58',
              500: '#f58025', // Primary Brand Color
              600: '#d96418',
              900: '#7c2d12',
            },
            navy: {
              800: '#1a2b4b', // Secondary Brand Color (Eyes/Text)
              900: '#0f172a',
            },
            cream: '#F9F9F5',
          },
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'scan': 'scan 3s linear infinite',
            'glitch': 'glitch 0.3s cubic-bezier(.25,.46,.45,.94) both infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            scan: {
              '0%': { top: '-100%' },
              '100%': { top: '100%' },
            },
            glitch: {
              '0%': { transform: 'translate(0)' },
              '20%': { transform: 'translate(-2px, 2px)' },
              '40%': { transform: 'translate(-2px, -2px)' },
              '60%': { transform: 'translate(2px, 2px)' },
              '80%': { transform: 'translate(2px, -2px)' },
              '100%': { transform: 'translate(0)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #F9F9F5;
      color: #1a2b4b;
      position: relative;
    }

    /* Cinematic Noise Overlay */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("https://grainy-gradients.vercel.app/noise.svg");
      filter: contrast(120%) brightness(100%);
      opacity: 0.03;
      pointer-events: none;
      z-index: 9999;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #F9F9F5;
    }

    ::-webkit-scrollbar-thumb {
      background: #f58025;
      border-radius: 4px;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "framer-motion": "https://esm.sh/framer-motion@^12.24.12",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
